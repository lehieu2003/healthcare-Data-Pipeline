services:
  postgres:
    image: postgres:15
    container_name: healthcare-postgres
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pipeline -d healthcare']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: healthcare-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  spark:
    image: apache/spark:3.5.5
    container_name: healthcare-spark
    command: sleep infinity
    environment:
      PYTHONPATH: /app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "4040:4040"
      - "4041:4041"
    profiles:
      - processing

  superset:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.superset
    image: healthcare-superset:local
    container_name: healthcare-superset
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: local-dev-change-me
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_ADMIN_FIRSTNAME: Healthcare
      SUPERSET_ADMIN_LASTNAME: Admin
      SUPERSET_ADMIN_EMAIL: admin@example.com
    command: >
      /bin/bash -c "
      superset db upgrade &&
      superset fab create-admin --username $${SUPERSET_ADMIN_USERNAME} --firstname $${SUPERSET_ADMIN_FIRSTNAME} --lastname $${SUPERSET_ADMIN_LASTNAME} --email $${SUPERSET_ADMIN_EMAIL} --password $${SUPERSET_ADMIN_PASSWORD} || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088"
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./dashboard/superset_config.py:/app/pythonpath/superset_config.py:ro

volumes:
  postgres_data:
  minio_data:
  superset_home:
